<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Businesses</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="biz-list-page">

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <div class="logo-icon"><i class="ti ti-trending-up"></i></div>Lumi5 Labs
    </a>
    <div class="nav-links">
      <button class="nav-btn" onclick="window.location.href='businessownerdashboard.html'">
        <i class="ti ti-layout-dashboard"></i> Dashboard
      </button>
      <button class="nav-btn active">
        <i class="ti ti-building-store"></i> My Businesses
      </button>
      <div class="nav-btn-wrap">
        <button class="nav-btn" onclick="window.location.href='messages.html'">
          <i class="ti ti-message"></i> Messages
        </button>
        <span class="nav-badge" id="nav-msg-badge" style="display:none;"></span>
      </div>
    </div>

    <div class="nav-right">
      <button class="icon-btn"><i class="ti ti-bell"></i></button>
      <div class="user-chip">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="name" id="user-name"></div>
          <div class="role" id="user-role"></div>
        </div>
        <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>My Businesses</h1>
        <p class="welcome-sub">Manage your startup portfolios</p>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='createportfolio.html'">
        <i class="ti ti-plus"></i> Create New Portfolio
      </button>
    </div>

    <div id="biz-list"></div>
  </main>

  <script src="js/mybusinesses.js"></script>
</body>

</html>
