<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Dashboard — Lumi5 Labs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="biz-dashboard">

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <div class="logo-icon"><i class="ti ti-trending-up"></i></div> Lumi5 Labs
    </a>
    <div class="nav-links">
      <button class="nav-btn active" onclick="window.location.href='businessownerdashboard.html'">
        <i class="ti ti-layout-dashboard"></i> Dashboard
      </button>
      <button class="nav-btn" onclick="window.location.href='mybusinesses.html'">
        <i class="ti ti-building-store"></i> My Businesses
      </button>
      <div class="nav-btn-wrap">
        <button class="nav-btn" onclick="openMessagesTab()"><i class="ti ti-message"></i> Messages</button>
        <span class="nav-badge" id="nav-msg-badge" style="display:none;"></span>
      </div>
    </div>
    <div class="nav-right">
      <button class="icon-btn"><i class="ti ti-bell"></i></button>
      <div class="role-menu" id="role-menu">
        <button class="user-chip" id="role-menu-button" type="button" aria-haspopup="true" aria-expanded="false">
          <div class="avatar" id="user-avatar"></div>
          <div class="user-info">
            <div class="name" id="user-name"></div>
            <div class="role" id="user-role"></div>
          </div>
          <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
        </button>
        <div class="role-dropdown" role="menu">
          <button class="role-option" type="button" onclick="signOut()" role="menuitem">
            <span class="role-option-avatar" style="background:#EF4444;"><i class="ti ti-logout" style="font-size:14px;"></i></span>
            <span class="role-option-name">Sign Out</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <h1 class="welcome-heading" id="page-title"></h1>
    <p class="welcome-sub" id="page-subtitle"></p>

    <div class="stats-grid">
      <div class="stat-card primary-card">
        <div>
          <div class="stat-label">Total Portfolios</div>
          <div class="stat-value" id="stat-total"></div>
          <div class="stat-sub" id="stat-breakdown"></div>
        </div>
        <div class="stat-icon icon-white-tint"><i class="ti ti-briefcase"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Investor Interests</div>
          <div class="stat-value" id="stat-interests"></div>
        </div>
        <div class="stat-icon icon-pink"><i class="ti ti-heart"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Messages</div>
          <div class="stat-value" id="stat-messages"></div>
          <div class="stat-unread" id="stat-unread-label"></div>
        </div>
        <div class="stat-icon icon-purple"><i class="ti ti-message"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Avg. Readiness <button class="score-info-btn" onclick="showScoreInfo()" title="How is this calculated?"><i class="ti ti-info-circle"></i></button></div>
          <div class="stat-value" id="stat-avg"></div>
        </div>
        <div class="stat-icon icon-green"><i class="ti ti-trending-up"></i></div>
      </div>
    </div>

    <div class="content-row">
      <div class="card">
        <div class="card-header">
          <span class="card-title">My Portfolios</span>
          <button class="manage-btn" onclick="window.location.href='mybusinesses.html'">
            Manage My Businesses <i class="ti ti-arrow-right"></i>
          </button>
        </div>
        <div class="count-grid">
          <div class="count-box approved">
            <div class="count-label">Approved</div>
            <div class="count-num" id="count-approved"></div>
          </div>
          <div class="count-box pending">
            <div class="count-label">Pending</div>
            <div class="count-num" id="count-pending"></div>
          </div>
          <div class="count-box draft">
            <div class="count-label">Draft</div>
            <div class="count-num" id="count-draft"></div>
          </div>
        </div>
        <div class="section-label">Recent Portfolios</div>
        <div id="portfolio-list"></div>
        <button class="view-all-btn" onclick="window.location.href='mybusinesses.html'">
          View All Portfolios <i class="ti ti-arrow-right"></i>
        </button>
      </div>

      <div class="sidebar-col">
        <div class="card">
          <div class="card-title" style="margin-bottom:12px"><i class="ti ti-heart" style="color:var(--pink)"></i>
            Recent Interests</div>
          <div id="interests-list"></div>
        </div>
        <div class="card">
          <div class="notif-header">
            <span class="card-title">Notifications</span>
            <button class="view-all-link">View all</button>
          </div>
          <div id="notifications-list"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    const statusLabel = { approved: "Approved", pending: "Pending Review", rejected: "Rejected", draft: "Draft" };

    function signOut() {
      localStorage.removeItem("lumilabsToken");
      window.location.href = "signin.html";
    }

    function openMessageThread(partnerId, partnerName, portfolioId, portfolioName) {
      const params = new URLSearchParams({ partnerId, partnerName, partnerRole: "investor", portfolioId, portfolioName });
      window.location.href = `messages.html?${params.toString()}`;
    }

    function initRoleMenu() {
      const menu = document.getElementById("role-menu");
      const button = document.getElementById("role-menu-button");
      button.addEventListener("click", (e) => {
        e.stopPropagation();
        menu.classList.toggle("open");
      });
      document.addEventListener("click", () => menu.classList.remove("open"));
    }

    async function init() {
      let user;
      try {
        user = await API.getCurrentUser();
      } catch {
        window.location.href = "signin.html";
        return;
      }
      if (user.role !== "business_owner") {
        window.location.href = "signin.html";
        return;
      }

      document.getElementById("user-avatar").innerText = user.name[0].toUpperCase();
      document.getElementById("user-name").innerText = user.name;
      document.getElementById("user-role").innerText = "Business Owner";
      document.getElementById("page-title").innerText = `Welcome back, ${user.name}`;
      document.getElementById("page-subtitle").innerText = "Manage your startup portfolio and connect with investors";

      let data;
      try {
        data = await API.getBusinessOwnerDashboard();
      } catch (err) {
        alert("Could not load dashboard: " + err.message);
        return;
      }

      if (data.messages.unread > 0) {
        const badge = document.getElementById("nav-msg-badge");
        badge.style.display = "flex";
        badge.innerText = data.messages.unread;
      }

      document.getElementById("stat-total").innerText = data.portfolios.total;
      document.getElementById("stat-breakdown").innerText = `${data.portfolios.approved} approved · ${data.portfolios.pending} pending · ${data.portfolios.draft} draft`;
      document.getElementById("stat-interests").innerText = data.investorInterests;
      document.getElementById("stat-messages").innerText = data.messages.total;
      document.getElementById("stat-unread-label").innerText = data.messages.unread > 0 ? `${data.messages.unread} unread` : "";
      document.getElementById("stat-avg").innerText = `${data.avgReadiness}/100`;

      document.getElementById("count-approved").innerText = data.portfolios.approved;
      document.getElementById("count-pending").innerText = data.portfolios.pending;
      document.getElementById("count-draft").innerText = data.portfolios.draft;

      document.getElementById("portfolio-list").innerHTML = data.recentPortfolios.length
        ? data.recentPortfolios.map(p => `
            <div class="portfolio-item">
              <div>
                <div class="portfolio-name">${p.name} <span class="badge ${p.status}">${statusLabel[p.status] || p.status}</span></div>
                <div class="portfolio-meta">${p.sector} · Readiness: ${p.readiness_score}/100</div>
              </div>
              <button class="btn-ghost" onclick="window.location.href='createportfolio.html?id=${p.id}'"><i class="ti ti-eye"></i></button>
            </div>`).join("")
        : `<div style="color:var(--text-muted);font-size:13px;padding:12px 0;">No portfolios yet. <a href="createportfolio.html">Create one</a>.</div>`;

      document.getElementById("interests-list").innerHTML = data.recentInterests.length
        ? data.recentInterests.map(i => `
            <div class="interest-item">
              <div class="inv-avatar">${i.investor[0].toUpperCase()}</div>
              <div>
                <div class="interest-name">${i.investor}</div>
                <div class="interest-sub">Interested in ${i.portfolio}</div>
              </div>
              <button class="btn-ghost" onclick="openMessageThread(${i.investor_id},'${encodeURIComponent(i.investor)}',${i.portfolio_id},'${encodeURIComponent(i.portfolio)}')">
                <i class="ti ti-message"></i>
              </button>
            </div>`).join("")
        : `<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No investor interests yet.</div>`;

      document.getElementById("notifications-list").innerHTML = data.notifications.length
        ? data.notifications.map(n => `
            <div class="notif-item">
              <div class="notif-title">${n.title}</div>
              <div class="notif-body">${n.body}</div>
            </div>`).join("")
        : `<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No notifications.</div>`;
    }

    initRoleMenu();
    init();
  </script>
</body>

</html>
