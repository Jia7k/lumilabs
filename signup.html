<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Lumi5 Labs</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-logo" href="index.html" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:inherit;">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="2,14 7,9 11,12 18,5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14,5 18,5 18,9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Lumi5 Labs</span>
    </a>
    <div class="nav-auth-buttons">
      <a href="signin.html" class="btn-nav btn-nav-outline">Sign In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-wrap">

      <a href="index.html" class="auth-back-link">&larr; Back to home</a>

      <div class="auth-head">
        <h1>Create Your Account</h1>
        <p>Join Lumi5 Labs as a business owner or an investor</p>
      </div>

      <div class="auth-card">

        <div id="signup-message" class="form-message"></div>

        <form id="signup-form" novalidate>
          <input type="hidden" id="role-input" value="business_owner" />

          <!-- ROLE TOGGLE -->
          <div class="role-toggle">
            <button type="button" class="role-toggle-btn" data-role="business_owner">
              <span class="rt-icon">
                <svg width="18" height="18" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="4" y="10" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M9 10V7a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span>
                <span class="rt-title">Business Owner</span>
                <span class="rt-sub">Create &amp; submit a startup portfolio</span>
              </span>
            </button>
            <button type="button" class="role-toggle-btn" data-role="investor">
              <span class="rt-icon">
                <svg width="18" height="18" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                  <circle cx="18" cy="10" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                  <path d="M2 22c0-4 3.6-7 8-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M18 15c4.4 0 8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span>
                <span class="rt-title">Investor</span>
                <span class="rt-sub">Browse startups &amp; express interest</span>
              </span>
            </button>
          </div>

          <div class="form-group">
            <label for="su-name">Full Name <span class="required">*</span></label>
            <input type="text" id="su-name" placeholder="Enter your full name" autocomplete="name" />
            <span class="form-error-text" id="su-name-error"></span>
          </div>

          <div class="form-group">
            <label for="su-email">Email <span class="required">*</span></label>
            <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email" />
            <span class="form-error-text" id="su-email-error"></span>
          </div>

          <div class="form-group">
            <label for="su-password">Password <span class="required">*</span></label>
            <input type="password" id="su-password" placeholder="At least 6 characters" autocomplete="new-password" />
            <span class="form-error-text" id="su-password-error"></span>
          </div>

          <div class="form-group">
            <label for="su-confirm-password">Confirm Password <span class="required">*</span></label>
            <input type="password" id="su-confirm-password" placeholder="Re-enter your password" autocomplete="new-password" />
            <span class="form-error-text" id="su-confirm-password-error"></span>
          </div>

          <p class="form-hint" id="role-hint">
            After signing up you'll be taken straight to building your startup portfolio.
          </p>

          <button type="submit" class="auth-submit-btn" id="signup-submit-btn">
            Create Account &amp; Add Startup
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="signin.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
