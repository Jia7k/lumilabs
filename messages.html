<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages - Lumi5 Labs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --logo-purple: #6B4EE6;
    --primary: #4361EE;
    --primary-dark: #3651D4;
    --accent-green: #52A475;
    --accent-pink: #D4537E;
    --bg-page: #F4F5F7;
    --bg-card: #FFFFFF;
    --bg-soft: #F9FAFB;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --text-primary: #111827;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body.role-investor {
    --primary: #52A475;
    --primary-dark: #448B62;
    --bg-page: #F9FAFB;
  }

  body.role-business-owner {
    --primary: #4361EE;
    --primary-dark: #3651D4;
    --bg-page: #F3F4F6;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
  }

  button, input, textarea { font: inherit; }
  button { cursor: pointer; }

  .nav {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    min-height: 56px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-right: 16px;
    text-decoration: none;
    white-space: nowrap;
  }
  .logo-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--logo-purple);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 15px;
  }
  .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-links[hidden] { display: none; }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
  }
  .nav-btn.active { background: #111827; color: white; }
  .nav-btn-wrap { position: relative; display: inline-flex; }
  .nav-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: #E24B4A;
    color: white;
    border-radius: 50%;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    font-size: 10px;
    font-weight: 600;
    display: none;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--bg-card);
  }
  .nav-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .icon-btn { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; }
  .role-menu { position: relative; }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px; cursor: pointer; border: none; background: none; text-align: left; }
  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
  }
  .user-info .name { font-size: 13px; font-weight: 600; }
  .user-info .role { font-size: 11px; color: var(--text-secondary); }
  .role-dropdown {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 230px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: 0 12px 28px rgba(17,24,39,0.14);
    padding: 6px;
    display: none;
    z-index: 20;
  }
  .role-menu.open .role-dropdown { display: block; }
  .role-option {
    width: 100%;
    border: none;
    background: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: var(--radius-md);
    cursor: pointer;
    text-align: left;
  }
  .role-option:hover { background: var(--bg-soft); }
  .role-option.active { background: rgba(67, 97, 238, 0.1); }
  body.role-investor .role-option.active { background: rgba(82, 164, 117, 0.12); }
  .role-option-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; flex: 0 0 auto; }
  .role-option-avatar.blue { background: #3B82F6; }
  .role-option-avatar.green { background: #52A475; }
  .role-option-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .role-check { margin-left: auto; color: var(--primary); font-size: 16px; }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px;
  }
  .page-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }
  .page-title { font-size: 26px; font-weight: 700; line-height: 1.2; }
  .page-subtitle { color: var(--text-secondary); margin-top: 4px; }
  .toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

  .btn {
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    border-radius: var(--radius-md);
    padding: 9px 12px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
  }
  .btn.primary {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .btn.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
  .btn.icon-only { width: 38px; height: 38px; justify-content: center; padding: 0; }

  .messaging-shell {
    height: min(720px, calc(100vh - 154px));
    min-height: 540px;
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .conversation-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #FFFFFF;
  }
  .panel-heading {
    padding: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .panel-title { font-size: 16px; font-weight: 700; }
  .count-pill {
    min-width: 24px;
    height: 24px;
    padding: 0 8px;
    border-radius: 999px;
    background: #EDE9FE;
    color: #6B4EE6;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .search-box {
    margin: 0 18px 14px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    color: var(--text-muted);
    background: var(--bg-soft);
  }
  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    min-width: 0;
    color: var(--text-primary);
  }
  .conversation-list {
    overflow-y: auto;
    padding: 0 10px 12px;
  }
  .conversation-item {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    border-radius: var(--radius-md);
    padding: 12px 10px;
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) auto;
    gap: 10px;
    text-align: left;
  }
  .conversation-item:hover { background: var(--bg-soft); }
  .conversation-item.active { background: #EEF2FF; border-color: #C7D2FE; }
  .conversation-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent-green);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .conversation-main { min-width: 0; }
  .conversation-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .conversation-name {
    font-size: 14px;
    font-weight: 700;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .conversation-time {
    color: var(--text-muted);
    font-size: 11px;
    white-space: nowrap;
  }
  .conversation-preview {
    color: var(--text-secondary);
    font-size: 12px;
    line-height: 1.35;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .conversation-meta {
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .unread-dot {
    min-width: 20px;
    height: 20px;
    border-radius: 999px;
    background: #E24B4A;
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    font-size: 11px;
    font-weight: 700;
    align-self: center;
  }

  .thread-panel {
    min-width: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: #FFFFFF;
  }
  .thread-header {
    min-height: 72px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 18px;
  }
  .thread-person {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .thread-title { font-size: 16px; font-weight: 700; }
  .thread-subtitle {
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 3px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .status-chip {
    border: 1px solid var(--border);
    background: var(--bg-soft);
    border-radius: 999px;
    padding: 5px 10px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .message-list {
    padding: 20px 18px;
    overflow-y: auto;
    background:
      linear-gradient(#FFFFFF, #FFFFFF) padding-box,
      linear-gradient(180deg, rgba(67, 97, 238, 0.04), rgba(82, 164, 117, 0.04)) border-box;
  }
  .message-row {
    display: flex;
    margin-bottom: 12px;
  }
  .message-row.mine { justify-content: flex-end; }
  .message-bubble {
    max-width: min(520px, 76%);
    border: 1px solid var(--border);
    background: var(--bg-soft);
    border-radius: 12px;
    padding: 10px 12px;
    line-height: 1.45;
    word-wrap: break-word;
  }
  .message-row.mine .message-bubble {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }
  .message-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .message-row.mine .message-meta { color: rgba(255,255,255,0.72); }

  .compose-form {
    border-top: 1px solid var(--border);
    padding: 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    background: var(--bg-card);
  }
  .compose-input {
    min-height: 44px;
    max-height: 130px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    outline: none;
    padding: 12px;
    line-height: 1.4;
  }
  .compose-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12); }
  .compose-form .btn { align-self: end; height: 44px; }

  .empty-state {
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-secondary);
    padding: 28px;
  }
  .empty-state i { font-size: 32px; color: var(--text-muted); margin-bottom: 10px; }
  .empty-title { color: var(--text-primary); font-weight: 700; margin-bottom: 4px; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(12px);
    opacity: 0;
    pointer-events: none;
    background: #111827;
    color: white;
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 13px;
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 30;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 820px) {
    .nav { padding: 10px 16px; align-items: flex-start; flex-wrap: wrap; }
    .nav-links { order: 3; width: 100%; overflow-x: auto; }
    .main { padding: 20px 16px; }
    .page-toolbar { flex-direction: column; }
    .toolbar-actions { justify-content: flex-start; }
    .messaging-shell {
      height: auto;
      min-height: 0;
      grid-template-columns: 1fr;
    }
    .conversation-panel {
      max-height: 330px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .thread-panel { min-height: 560px; }
  }
</style>
</head>
<body class="role-business-owner">
  <nav class="nav">
    <a class="nav-logo" href="index.html"><div class="logo-icon"><i class="ti ti-trending-up"></i></div> Lumi5 Labs</a>

    <div class="nav-links" id="business-nav">
      <button class="nav-btn" onclick="window.location.href='businessownerdashboard.html'"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
      <button class="nav-btn"><i class="ti ti-building-store"></i> My Businesses</button>
      <div class="nav-btn-wrap">
        <button class="nav-btn active" onclick="window.location.href='messages.html'"><i class="ti ti-message"></i> Messages</button>
        <span class="nav-badge" id="nav-msg-badge"></span>
      </div>
    </div>

    <div class="nav-links" id="investor-nav" hidden>
      <button class="nav-btn" onclick="window.location.href='investordashboard.html'"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
      <button class="nav-btn"><i class="ti ti-search"></i> Browse Startups</button>
      <button class="nav-btn"><i class="ti ti-heart"></i> My Interests</button>
      <button class="nav-btn active" onclick="window.location.href='messages.html'"><i class="ti ti-message"></i> Messages</button>
    </div>

    <div class="nav-right">
      <button class="icon-btn"><i class="ti ti-bell"></i></button>
      <div class="role-menu" id="role-menu">
        <button class="user-chip" id="role-menu-button" type="button" aria-haspopup="true" aria-expanded="false">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-info">
            <div class="name" id="user-name">Loading</div>
            <div class="role" id="user-role">Messages</div>
          </div>
          <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
        </button>
        <div class="role-dropdown" role="menu">
          <button class="role-option" id="role-option-beta" type="button" data-role-key="beta" role="menuitem">
            <span class="role-option-avatar blue">B</span>
            <span class="role-option-name">Beta</span>
            <i class="ti ti-check role-check" hidden></i>
          </button>
          <button class="role-option" id="role-option-alpha" type="button" data-role-key="alpha" role="menuitem">
            <span class="role-option-avatar green">A</span>
            <span class="role-option-name">Alpha</span>
            <i class="ti ti-check role-check" hidden></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="page-toolbar">
      <div>
        <h1 class="page-title">Messages</h1>
        <p class="page-subtitle" id="mode-label">Loading conversations...</p>
      </div>
      <div class="toolbar-actions">
        <button class="btn" id="refresh-btn" type="button" aria-label="Refresh conversations" title="Refresh conversations" style="display:inline-flex;align-items:center;gap:5px;padding:6px 14px;font-size:13px;white-space:nowrap;">↻ Refresh</button>
      </div>
    </div>

    <section class="messaging-shell" aria-label="Messaging workspace">
      <aside class="conversation-panel" aria-label="Conversation list">
        <div class="panel-heading">
          <div class="panel-title">Inbox</div>
          <div class="count-pill" id="unread-count">0</div>
        </div>
        <label class="search-box">
          <i class="ti ti-search"></i>
          <input id="conversation-search" type="search" placeholder="Search messages" autocomplete="off" />
        </label>
        <div class="conversation-list" id="conversation-list"></div>
      </aside>

      <section class="thread-panel" aria-label="Message thread">
        <header class="thread-header">
          <div class="thread-person">
            <div class="conversation-avatar" id="thread-avatar">?</div>
            <div style="min-width:0;">
              <div class="thread-title" id="thread-title">Select a conversation</div>
              <div class="thread-subtitle" id="thread-subtitle">Choose someone from your inbox to start messaging.</div>
            </div>
          </div>
          <div class="status-chip" id="thread-status">Ready</div>
        </header>

        <div class="message-list" id="message-list">
          <div class="empty-state">
            <i class="ti ti-message-circle"></i>
            <div class="empty-title">No conversation selected</div>
            <div>Pick a thread or start one from an investor interest.</div>
          </div>
        </div>

        <form class="compose-form" id="message-form">
          <textarea class="compose-input" id="message-input" rows="1" maxlength="2000" placeholder="Write a message..." disabled></textarea>
          <button class="btn primary" id="send-btn" type="submit" disabled><i class="ti ti-send"></i> Send</button>
        </form>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="js/messages.js"></script>
</body>
</html>
