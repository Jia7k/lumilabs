<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Browse Startups — Lumi5 Labs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary-green: #52A475; --logo-purple: #6B4EE6; --header-purple: #7B61FF;
    --pink-bg: #FBEAF0; --pink-text: #D4537E;
    --blue-bg: #E6F1FB; --blue-text: #378ADD;
    --purple-light: #F3F0FF; --purple-text: #7B61FF;
    --bg-page: #F9FAFB; --bg-card: #FFFFFF; --border: #E5E7EB;
    --text-primary: #111827; --text-secondary: #6B7280; --text-muted: #9CA3AF;
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; font-size: 14px; }
  .nav { background: var(--bg-card); border-bottom: 1px solid var(--border); height: 56px; padding: 0 28px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 10; }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--text-primary); margin-right: 16px; text-decoration: none; }
  .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--logo-purple); display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; }
  .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-secondary); }
  .nav-btn.active { background: #111827; color: white; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; border: none; background: none; text-align: left; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: #52A475; color: white; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .user-info .name { font-size: 13px; font-weight: 600; }
  .user-info .role { font-size: 11px; color: var(--text-secondary); }
  .role-menu { position: relative; }
  .role-dropdown { position: absolute; top: calc(100% + 10px); right: 0; width: 180px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: 0 12px 28px rgba(17,24,39,0.14); padding: 6px; display: none; z-index: 20; }
  .role-menu.open .role-dropdown { display: block; }
  .role-option { width: 100%; border: none; background: transparent; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-md); cursor: pointer; text-align: left; }
  .role-option:hover { background: var(--bg-page); }
  .role-option-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; flex: 0 0 auto; }
  .role-option-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }

  .main { max-width: 1200px; margin: 0 auto; padding: 32px 28px 48px; }
  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 24px; font-weight: 700; }
  .page-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

  .filters { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; color: var(--text-primary); outline: none; }
  .filter-input:focus { border-color: var(--header-purple); }
  .filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; color: var(--text-primary); background: var(--bg-card); outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--header-purple); }
  .btn-filter { padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); }
  .btn-filter.active { background: #111827; color: white; border-color: #111827; }

  .results-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .results-count { font-size: 13px; color: var(--text-secondary); }
  #browse-status { color: var(--text-secondary); font-size: 13px; }
  #browse-status.warning { color: #9A6700; }
  #browse-status.error { color: #B42318; }
  #browse-status button { margin-left: 8px; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .startup-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-icon { width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--purple-light); display: flex; align-items: center; justify-content: center; color: var(--purple-text); font-size: 18px; }
  .sector-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; background: var(--blue-bg); color: var(--blue-text); }
  .card-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .card-owner { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meta-box { background: var(--bg-page); border-radius: var(--radius-md); padding: 8px 10px; }
  .meta-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .meta-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .score-value { color: var(--primary-green); }
  .card-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-interest { flex: 1; padding: 9px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .btn-interest.interested { background: var(--pink-bg); color: var(--pink-text); border-color: var(--pink-text); }
  .btn-interest:hover:not(.interested) { background: var(--purple-light); border-color: var(--header-purple); color: var(--header-purple); }
  .btn-message { padding: 9px 12px; border-radius: var(--radius-md); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); }
  .btn-message:hover { background: var(--bg-page); }
  .empty-state { text-align: center; padding: 64px 24px; color: var(--text-secondary); }
  .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; color: var(--text-muted); }
  .high-potential-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: var(--purple-light); color: var(--purple-text); padding: 2px 8px; border-radius: 20px; font-weight: 500; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="investordashboard.html"><div class="logo-icon"><i class="ti ti-trending-up"></i></div> Lumi5 Labs</a>
  <div class="nav-links">
    <button class="nav-btn" onclick="window.location.href='investordashboard.html'"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
    <button class="nav-btn active" onclick="window.location.href='browse.html'"><i class="ti ti-search"></i> Browse Startups</button>
    <button class="nav-btn" onclick="window.location.href='my-interests.html'"><i class="ti ti-heart"></i> My Interests</button>
    <button class="nav-btn" onclick="window.location.href='messages.html'"><i class="ti ti-message"></i> Messages</button>
  </div>
  <div class="nav-right">
    <div class="role-menu" id="role-menu">
      <button class="user-chip" id="role-menu-button" type="button">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="name" id="user-name"></div>
          <div class="role">Investor</div>
        </div>
        <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
      </button>
      <div class="role-dropdown">
        <button class="role-option" onclick="signOut()">
          <span class="role-option-avatar" style="background:#EF4444;"><i class="ti ti-logout" style="font-size:14px;"></i></span>
          <span class="role-option-name">Sign Out</span>
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1 class="page-title">Browse Startups</h1>
    <p class="page-sub">Explore AI-recommended investment opportunities</p>
  </div>

  <div class="filters">
    <input class="filter-input" id="search-input" type="text" placeholder="Search startups..." />
    <select class="filter-select" id="sector-filter">
      <option value="">All Sectors</option>
      <option>Fintech</option>
      <option>Healthtech</option>
      <option>Edtech</option>
      <option>AI / ML</option>
      <option>E-commerce</option>
      <option>SaaS</option>
      <option>Clean Energy</option>
      <option>Other</option>
    </select>
    <select class="filter-select" id="score-filter">
      <option value="">Any Score</option>
      <option value="75">75+ (High Potential)</option>
      <option value="50">50+</option>
      <option value="25">25+</option>
    </select>
    <button class="btn-filter active" id="sort-ai" onclick="setSort('ai')"><i class="ti ti-stars"></i> AI Ranked</button>
    <button class="btn-filter" id="sort-new" onclick="setSort('new')"><i class="ti ti-clock"></i> Newest</button>
  </div>

  <div class="results-row">
    <span class="results-count" id="results-count">Loading...</span>
    <div id="browse-status" role="status" aria-live="polite" hidden></div>
  </div>

  <div class="card-grid" id="card-grid">
    <div class="empty-state"><i class="ti ti-loader-2"></i>Loading startups...</div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/browse.js"></script>
</body>
</html>
