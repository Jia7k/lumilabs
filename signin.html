<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Lumi5 Labs</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-logo" href="index.html" style="display:flex; align-items:center; gap:8px; text-decoration:none; color:inherit;">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="2,14 7,9 11,12 18,5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="14,5 18,5 18,9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Lumi5 Labs</span>
    </a>
    <div class="nav-auth-buttons">
      <a href="signup.html" class="btn-nav btn-nav-primary">Sign Up</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-wrap">

      <a href="index.html" class="auth-back-link">&larr; Back to home</a>

      <div class="auth-head">
        <h1>Welcome Back</h1>
        <p>Sign in to your Lumi5 Labs account</p>
      </div>

      <div class="auth-card">

        <div id="signin-message" class="form-message"></div>

        <form id="signin-form" novalidate>
          <div class="form-group">
            <label for="si-email">Email <span class="required">*</span></label>
            <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email" />
            <span class="form-error-text" id="si-email-error"></span>
          </div>

          <div class="form-group">
            <label for="si-password">Password <span class="required">*</span></label>
            <input type="password" id="si-password" placeholder="Enter your password" autocomplete="current-password" />
            <span class="form-error-text" id="si-password-error"></span>
          </div>

          <button type="submit" class="auth-submit-btn" id="signin-submit-btn">
            Sign In
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
