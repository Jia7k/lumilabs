<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moderation Dashboard — Lumi5 Labs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary-orange: #DE8E42;
    --logo-purple: #6B4EE6;
    --avatar-purple: #8B5CF6;
    --green-bg: #EAF3DE; --green-text: #3B6D11;
    --red-bg: #FCEBEB; --red-text: #A32D2D;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --purple-bg: #EDE9FE; --purple-text: #8B5CF6;
    --bg-page: #F9FAFB; --bg-card: #FFFFFF; --border: #E5E7EB;
    --text-primary: #111827; --text-secondary: #6B7280; --text-muted: #9CA3AF;
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; font-size: 14px; }
  
  /* Nav */
  .nav { background: var(--bg-card); border-bottom: 1px solid var(--border); height: 56px; padding: 0 28px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 10; }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--text-primary); margin-right: 16px; text-decoration: none; }
  .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--logo-purple); display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; }
  .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-secondary); }
  .nav-btn.active { background: #111827; color: white; }
  .nav-btn-wrap { position: relative; display: inline-flex; }
  .nav-badge { position: absolute; top: -6px; right: -6px; background: #DE8E42; color: white; border-radius: 10px; padding: 2px 6px; font-size: 10px; font-weight: 600; border: 1.5px solid var(--bg-card); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--avatar-purple); color: white; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .user-info .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-info .role { font-size: 11px; color: var(--text-secondary); }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 28px 48px; }
  .welcome-heading { font-size: 26px; font-weight: 700; color: var(--text-primary); }
  .welcome-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 24px 0; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .stat-card.orange-card { background: var(--primary-orange); border-color: var(--primary-orange); color: white; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
  .orange-card .stat-label { color: rgba(255,255,255,0.9); }
  .stat-value { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .icon-orange-tint { background: rgba(255,255,255,0.2); color: white; }
  .icon-green { background: var(--green-bg); color: var(--green-text); border: 1px solid #D1E5B8; }
  .icon-red { background: var(--red-bg); color: var(--red-text); border: 1px solid #F3CACA; }
  .icon-purple { background: var(--purple-bg); color: var(--purple-text); }

  /* Table Card */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .card-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 12px; }
  .badge-yellow { background: var(--amber-bg); color: var(--amber-text); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .btn-outline { border: 1px solid var(--border); background: var(--bg-card); padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; }
  
  /* Queue Table */
  .table { width: 100%; border-collapse: collapse; text-align: left; }
  .table th { padding: 12px 8px; font-size: 13px; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
  .table td { padding: 16px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .table tr:last-child td { border-bottom: none; }
  
  .startup-cell { display: flex; align-items: center; gap: 12px; }
  .startup-icon { width: 36px; height: 36px; background: var(--bg-page); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
  .startup-name { font-weight: 600; font-size: 14px; }
  .startup-owner { font-size: 12px; color: var(--text-secondary); }
  
  .status-wrapper { display: flex; align-items: center; gap: 8px; }
  .score-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #D1E5B8; color: var(--green-text); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .btn-review { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border); background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-review:hover { background: var(--bg-page); }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="#">
    <div class="logo-icon"><i class="ti ti-trending-up"></i></div> Lumi5 Labs
  </a>
  <div class="nav-links">
    <div class="nav-btn-wrap">
      <button class="nav-btn active"><i class="ti ti-shield-check"></i> Moderation Dashboard</button>
      <span class="nav-badge" id="nav-pending-badge"></span>
    </div>
    <button class="nav-btn"><i class="ti ti-settings"></i> Audit Logs</button>
  </div>
  <div class="nav-right">
    <div class="user-chip">
      <div class="avatar" id="user-avatar"></div>
      <div class="user-info">
        <div class="name" id="user-name"></div>
        <div class="role" id="user-role"></div>
      </div>
      <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
    </div>
  </div>
</nav>

<main class="main">
  <h1 class="welcome-heading" id="page-title"></h1>
  <p class="welcome-sub" id="page-subtitle"></p>

  <div class="stats-grid">
    <div class="stat-card orange-card">
      <div>
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="stat-pending"></div>
      </div>
      <div class="stat-icon icon-orange-tint"><i class="ti ti-clock"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">Approved</div>
        <div class="stat-value" id="stat-approved"></div>
      </div>
      <div class="stat-icon icon-green"><i class="ti ti-check"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">Rejected</div>
        <div class="stat-value" id="stat-rejected"></div>
      </div>
      <div class="stat-icon icon-red"><i class="ti ti-x"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">Total Matches</div>
        <div class="stat-value" id="stat-matches"></div>
      </div>
      <div class="stat-icon icon-purple"><i class="ti ti-users"></i></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">
        Moderation Queue <span class="badge-yellow" id="queue-badge"></span>
      </div>
      <button class="btn-outline">View Audit Logs</button>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>Startup</th>
          <th>Industry</th>
          <th>Submitted</th>
          <th>Status</th>
          <th>Score</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="queue-list"></tbody>
    </table>
  </div>
</main>

<script>
  async function getAdminData() {
    // Replace with actual API call
    return {
      user: { name: "Victor", role: "Administrator" },
      pageDetails: { title: "Moderation Dashboard", subtitle: "Review and manage startup portfolios" },
      stats: { pending: 1, approved: 7, rejected: 3, totalMatches: 2 },
      queue: [
        { name: "Happi", owner: "Beta", industry: "Healthtech", submittedDate: "Feb 13, 2026", submittedTime: "6:01 AM", status: "Pending Review", score: 80 }
      ]
    };
  }

  async function initAdmin() {
    const data = await getAdminData();
    
    document.getElementById("user-avatar").innerText = data.user.name[0].toUpperCase();
    document.getElementById("user-name").innerText = data.user.name;
    document.getElementById("user-role").innerText = data.user.role;
    
    document.getElementById("page-title").innerText = data.pageDetails.title;
    document.getElementById("page-subtitle").innerText = data.pageDetails.subtitle;
    
    document.getElementById("nav-pending-badge").innerText = data.stats.pending;
    document.getElementById("stat-pending").innerText = data.stats.pending;
    document.getElementById("stat-approved").innerText = data.stats.approved;
    document.getElementById("stat-rejected").innerText = data.stats.rejected;
    document.getElementById("stat-matches").innerText = data.stats.totalMatches;
    document.getElementById("queue-badge").innerText = `${data.stats.pending} pending`;

    const tbody = document.getElementById("queue-list");
    tbody.innerHTML = "";
    data.queue.forEach(item => {
      tbody.innerHTML += `
        <tr>
          <td>
            <div class="startup-cell">
              <div class="startup-icon"><i class="ti ti-building"></i></div>
              <div>
                <div class="startup-name">${item.name}</div>
                <div class="startup-owner">${item.owner}</div>
              </div>
            </div>
          </td>
          <td>${item.industry}</td>
          <td>
            <div>${item.submittedDate}</div>
            <div style="color: var(--text-secondary); font-size: 12px;">${item.submittedTime}</div>
          </td>
          <td>
            <div class="status-wrapper">
              <span class="badge-yellow">${item.status}</span>
              <i class="ti ti-alert-triangle" style="color: var(--amber-text)"></i>
            </div>
          </td>
          <td><div class="score-circle">${item.score}</div></td>
          <td><button class="btn-review"><i class="ti ti-eye"></i> Review</button></td>
        </tr>
      `;
    });
  }

  initAdmin();
</script>
</body>
</html>
