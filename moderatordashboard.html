<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderation Dashboard — Lumi5 Labs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="dashboard">

  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <div class="logo-icon"><i class="ti ti-trending-up"></i></div>Lumi5 Labs
    </a>
    <div class="nav-links">
      <div class="nav-btn-wrap">
        <button class="nav-btn active"><i class="ti ti-shield"></i> Moderation Dashboard</button>
        <span class="nav-badge" id="nav-pending-badge"></span>
      </div>
      <button class="nav-btn" onclick="window.location.href='audit-logs.html'">
        <i class="ti ti-settings"></i> Audit Logs
      </button>
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="name" id="user-name"></div>
          <div class="role" id="user-role"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main">
    <h1 class="welcome-heading" id="page-title"></h1>
    <p class="welcome-sub" id="page-subtitle"></p>

    <div class="stats-grid">
      <div class="stat-card orange-card">
        <div>
          <div class="stat-label">Pending Review</div>
          <div class="stat-value" id="stat-pending"></div>
        </div>
        <div class="stat-icon icon-white-tint"><i class="ti ti-clock"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Approved</div>
          <div class="stat-value" id="stat-approved"></div>
        </div>
        <div class="stat-icon icon-green"><i class="ti ti-check"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Rejected</div>
          <div class="stat-value" id="stat-rejected"></div>
        </div>
        <div class="stat-icon icon-red"><i class="ti ti-x"></i></div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Total Matches</div>
          <div class="stat-value" id="stat-matches"></div>
        </div>
        <div class="stat-icon icon-purple"><i class="ti ti-users"></i></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          Moderation Queue <span class="badge-yellow" id="queue-badge"></span>
        </div>
        <button class="btn-review" onclick="window.location.href='audit-logs.html'">
          View Audit Logs
        </button>
      </div>
      <table class="table">
        <thead>
          <tr>
            <th>Startup</th>
            <th>Industry</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Score</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="queue-list"></tbody>
      </table>
    </div>
  </main>

  <!-- Review modal -->
  <div class="modal-overlay" id="review-overlay">
    <div class="modal-card" id="review-card"></div>
  </div>

  <div class="reason-overlay" id="reason-overlay">
    <div class="reason-card">
      <h3>Reject Portfolio</h3>
      <p>Please provide a reason for rejection. This feedback will be sent to the business owner.</p>
      <textarea class="reason-textarea" id="reason-textarea" placeholder="e.g. Weak market traction"></textarea>
      <div class="reason-footer">
        <button class="btn-cancel-outline" id="reason-cancel-btn">Cancel</button>
        <button class="btn-confirm-reject" id="reason-confirm-btn">Reject Portfolio</button>
      </div>
    </div>
  </div>

  <script src="js/moderatordashboard.js"></script>
</body>

</html>
