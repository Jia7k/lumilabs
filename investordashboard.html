<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Investor Dashboard — Lumi5 Labs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary-green: #52A475;
    --logo-purple: #6B4EE6;
    --header-purple: #7B61FF;
    --avatar-green: #52A475;
    --pink-bg: #FBEAF0; --pink-text: #D4537E;
    --blue-bg: #E6F1FB; --blue-text: #378ADD;
    --purple-light: #F3F0FF; --purple-text: #7B61FF;
    --bg-page: #F9FAFB; --bg-card: #FFFFFF; --border: #E5E7EB;
    --text-primary: #111827; --text-secondary: #6B7280; --text-muted: #9CA3AF;
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; font-size: 14px; }
  
  /* Nav */
  .nav { background: var(--bg-card); border-bottom: 1px solid var(--border); height: 56px; padding: 0 28px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 10; }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: var(--text-primary); margin-right: 16px; text-decoration: none; }
  .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--logo-purple); display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; }
  .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text-secondary); }
  .nav-btn.active { background: #111827; color: white; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .icon-btn { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; }
  .role-menu { position: relative; }
  .user-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; border: none; background: none; text-align: left; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--avatar-green); color: white; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .user-info .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .user-info .role { font-size: 11px; color: var(--text-secondary); }
  .role-dropdown { position: absolute; top: calc(100% + 10px); right: 0; width: 230px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: 0 12px 28px rgba(17,24,39,0.14); padding: 6px; display: none; z-index: 20; }
  .role-menu.open .role-dropdown { display: block; }
  .role-option { width: 100%; border: none; background: transparent; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-md); cursor: pointer; text-align: left; }
  .role-option:hover { background: var(--bg-page); }
  .role-option.active { background: rgba(82, 164, 117, 0.1); }
  .role-option-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 700; flex: 0 0 auto; }
  .role-option-avatar.blue { background: #3B82F6; }
  .role-option-avatar.green { background: var(--avatar-green); }
  .role-option-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .role-check { margin-left: auto; color: var(--primary-green); font-size: 16px; }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 28px 48px; }
  .welcome-heading { font-size: 26px; font-weight: 700; color: var(--text-primary); }
  .welcome-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 24px 0; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .stat-card.green-card { background: var(--primary-green); border-color: var(--primary-green); color: white; }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
  .green-card .stat-label { color: rgba(255,255,255,0.9); }
  .stat-value { font-size: 30px; font-weight: 700; line-height: 1; }
  .stat-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .icon-green-tint { background: rgba(255,255,255,0.2); color: white; }
  .icon-pink { background: var(--pink-bg); color: var(--pink-text); }
  .icon-blue { background: var(--blue-bg); color: var(--blue-text); }
  .icon-purple-light { background: var(--purple-light); color: var(--purple-text); }

  /* Layout */
  .layout-grid { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
  
  /* Recommended Section */
  .recommended-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; }
  .rec-header { background: var(--header-purple); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .rec-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .btn-refresh { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: var(--radius-md); font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .rec-list { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .rec-item { background: var(--bg-page); border-radius: var(--radius-md); padding: 12px 16px; display: flex; align-items: center; gap: 16px; }
  .rec-rank { background: var(--purple-light); color: var(--purple-text); font-weight: 600; width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .rec-info { flex: 1; }
  .rec-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .rec-name { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .badge-purple { background: var(--purple-light); color: var(--purple-text); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .rec-industry { font-size: 13px; color: var(--text-secondary); }
  .score-text { font-weight: 600; color: var(--primary-green); font-size: 14px; margin-right: 8px; }
  .rec-arrow { color: var(--text-muted); font-size: 18px; cursor: pointer; }
  .btn-full-width { display: block; width: calc(100% - 40px); margin: 0 20px 20px; text-align: center; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: none; font-weight: 500; cursor: pointer; }

  /* Recently Added */
  .card-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .section-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 600; }
  .link-view-all { font-size: 13px; font-weight: 500; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 4px; }
  
  .recent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .recent-card { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; height: 140px; }
  .rc-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .rc-icon { width: 36px; height: 36px; background: var(--bg-page); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
  .rc-star { background: var(--purple-light); color: var(--purple-text); width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .rc-name { font-weight: 600; font-size: 14px; margin-top: 12px; }
  .rc-industry { font-size: 12px; color: var(--text-secondary); }
  .rc-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .rc-money { font-weight: 600; color: var(--primary-green); font-size: 13px; }
  .rc-score { font-weight: 600; color: var(--primary-green); font-size: 13px; background: rgba(82, 164, 117, 0.1); padding: 2px 8px; border-radius: 12px; }

  /* Sidebar */
  .sidebar-stack { display: flex; flex-direction: column; gap: 16px; }
  .quick-action-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); background: none; font-size: 14px; font-weight: 500; margin-bottom: 8px; cursor: pointer; }
  .qa-left { display: flex; align-items: center; gap: 12px; }
  .badge-red { background: var(--pink-bg); color: var(--pink-text); font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
  
  .interest-list-item { background: var(--bg-page); border-radius: var(--radius-md); padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .il-icon { width: 36px; height: 36px; background: var(--pink-bg); color: var(--pink-text); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .il-name { font-weight: 600; font-size: 14px; }
  .il-sub { font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="#"><div class="logo-icon"><i class="ti ti-trending-up"></i></div> Lumi5 Labs</a>
  <div class="nav-links">
    <button class="nav-btn active"><i class="ti ti-layout-dashboard"></i> Dashboard</button>
    <button class="nav-btn"><i class="ti ti-search"></i> Browse Startups</button>
    <button class="nav-btn"><i class="ti ti-heart"></i> My Interests</button>
    <button class="nav-btn" onclick="openMessagesTab()"><i class="ti ti-message"></i> Messages</button>
  </div>
  <div class="nav-right">
    <button class="icon-btn"><i class="ti ti-bell"></i></button>
    <div class="role-menu" id="role-menu">
      <button class="user-chip" id="role-menu-button" type="button" aria-haspopup="true" aria-expanded="false">
        <div class="avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="name" id="user-name"></div>
          <div class="role" id="user-role"></div>
        </div>
        <i class="ti ti-chevron-down" style="font-size:14px; color:var(--text-secondary)"></i>
      </button>
      <div class="role-dropdown" role="menu">
        <button class="role-option" type="button" onclick="switchRole('beta')" role="menuitem">
          <span class="role-option-avatar blue">B</span>
          <span class="role-option-name">Beta</span>
        </button>
        <button class="role-option active" type="button" onclick="switchRole('alpha')" role="menuitem">
          <span class="role-option-avatar green">A</span>
          <span class="role-option-name">Alpha</span>
          <i class="ti ti-check role-check"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <h1 class="welcome-heading" id="page-title"></h1>
  <p class="welcome-sub" id="page-subtitle"></p>

  <div class="stats-grid">
    <div class="stat-card green-card">
      <div>
        <div class="stat-label">Available Startups</div>
        <div class="stat-value" id="stat-available"></div>
      </div>
      <div class="stat-icon icon-green-tint"><i class="ti ti-briefcase"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">My Interests</div>
        <div class="stat-value" id="stat-interests"></div>
      </div>
      <div class="stat-icon icon-pink"><i class="ti ti-heart"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">Messages</div>
        <div class="stat-value" id="stat-messages"></div>
      </div>
      <div class="stat-icon icon-blue"><i class="ti ti-message"></i></div>
    </div>
    <div class="stat-card">
      <div>
        <div class="stat-label">High Potential</div>
        <div class="stat-value" id="stat-potential"></div>
      </div>
      <div class="stat-icon icon-purple-light"><i class="ti ti-star"></i></div>
    </div>
  </div>

  <div class="layout-grid">
    <div class="content-left">
      <div class="recommended-wrapper">
        <div class="rec-header">
          <div class="rec-title"><i class="ti ti-stars"></i> Recommended for You</div>
          <button class="btn-refresh"><i class="ti ti-refresh"></i> Refresh</button>
        </div>
        <div class="rec-list" id="recommended-list"></div>
        <button class="btn-full-width">See All Recommendations <i class="ti ti-arrow-right" style="vertical-align: middle;"></i></button>
      </div>

      <div class="card-container">
        <div class="section-title-row">
          <div class="section-title">Recently Added</div>
          <a href="#" class="link-view-all">View All <i class="ti ti-arrow-right"></i></a>
        </div>
        <div class="recent-grid" id="recently-added-grid"></div>
      </div>
    </div>

    <div class="sidebar-stack">
      <div class="card-container">
        <div class="section-title" style="margin-bottom: 16px;">Quick Actions</div>
        <div id="quick-actions-list"></div>
      </div>
      <div class="card-container">
        <div class="section-title-row">
          <div class="section-title" style="display:flex; align-items:center; gap:8px;">
            <i class="ti ti-heart" style="color:var(--pink-text)"></i> Recent Interests
          </div>
          <a href="#" class="link-view-all" style="color:var(--primary-green)">View all</a>
        </div>
        <div id="recent-interests-list"></div>
      </div>
    </div>
  </div>
</main>

<script>
  async function getInvestorData() {
    return {
      user: { name: "Alpha", role: "Investor" },
      pageDetails: { title: "Welcome back, Alpha", subtitle: "Discover promising startups and investment opportunities" },
      stats: { available: 7, interests: 3, messages: 2, potential: 3 },
      recommended: [
        { id: "#1", name: "X3", industry: "Fintech", score: 85, isHighPotential: true },
        { id: "#2", name: "Apple Intelligence", industry: "Ai Ml", score: 85, isHighPotential: true },
        { id: "#3", name: "Teckkers", industry: "Fintech", score: 75, isHighPotential: true }
      ],
      recentAdded: [
        { name: "X3", industry: "Fintech", funding: "$0.5M", score: 85, colorClass: "purple" },
        { name: "Apple Intelligence", industry: "Ai Ml", funding: "$100.0M", score: 85, colorClass: "purple", titleColor: "var(--primary-green)" },
        { name: "Teckkers", industry: "Fintech", funding: "$10.0M", score: 75, colorClass: "purple" },
        { name: "X1", industry: "Fintech", funding: "$0.1M", score: 55, colorClass: "gray" }
      ],
      quickActions: [
        { label: "Browse Startups", icon: "ti-search" },
        { label: "My Interests", icon: "ti-heart", badge: 3 },
        { label: "Messages", icon: "ti-message", action: "messages" }
      ],
      recentInterests: [
        { name: "X3", status: "Interested" },
        { name: "Teckkers", status: "Interested" },
        { name: "Apple Intelligence", status: "Interested" }
      ]
    };
  }

  async function initInvestor() {
    const data = await getInvestorData();
    
    document.getElementById("user-avatar").innerText = data.user.name[0].toUpperCase();
    document.getElementById("user-name").innerText = data.user.name;
    document.getElementById("user-role").innerText = data.user.role;
    document.getElementById("page-title").innerText = data.pageDetails.title;
    document.getElementById("page-subtitle").innerText = data.pageDetails.subtitle;
    
    document.getElementById("stat-available").innerText = data.stats.available;
    document.getElementById("stat-interests").innerText = data.stats.interests;
    document.getElementById("stat-messages").innerText = data.stats.messages;
    document.getElementById("stat-potential").innerText = data.stats.potential;

    const recList = document.getElementById("recommended-list");
    recList.innerHTML = data.recommended.map(item => `
      <div class="rec-item">
        <div class="rec-rank">${item.id}</div>
        <div class="rec-info">
          <div class="rec-name-row">
            <span class="rec-name">${item.name}</span>
            ${item.isHighPotential ? `<span class="badge-purple"><i class="ti ti-star"></i> High Potential</span>` : ''}
          </div>
          <div class="rec-industry">${item.industry}</div>
        </div>
        <div class="score-text">${item.score}</div>
        <i class="ti ti-arrow-right rec-arrow"></i>
      </div>
    `).join('');

    const recentGrid = document.getElementById("recently-added-grid");
    recentGrid.innerHTML = data.recentAdded.map(item => `
      <div class="recent-card">
        <div class="rc-top">
          <div class="rc-icon"><i class="ti ti-briefcase"></i></div>
          <div class="rc-star" style="background:${item.colorClass==='gray'?'var(--bg-page)':'var(--purple-light)'}; color:${item.colorClass==='gray'?'var(--text-muted)':'var(--purple-text)'}"><i class="ti ti-star"></i></div>
        </div>
        <div>
          <div class="rc-name" style="color: ${item.titleColor || 'inherit'}">${item.name}</div>
          <div class="rc-industry">${item.industry}</div>
        </div>
        <div class="rc-bottom">
          <div class="rc-money" style="color:${item.score >= 70 ? 'var(--primary-green)' : 'var(--text-secondary)'}">${item.funding}</div>
          <div class="rc-score" style="color:${item.score >= 70 ? 'var(--primary-green)' : '#D98F39'}; background:${item.score >= 70 ? 'rgba(82, 164, 117, 0.1)' : 'rgba(217, 143, 57, 0.1)'}">${item.score}</div>
        </div>
      </div>
    `).join('');

    const qaList = document.getElementById("quick-actions-list");
    qaList.innerHTML = data.quickActions.map(action => `
      <button class="quick-action-btn" ${action.action === 'messages' ? 'onclick="openMessagesTab()"' : ''}>
        <div class="qa-left"><i class="ti ${action.icon}"></i> ${action.label}</div>
        ${action.badge ? `<span class="badge-red">${action.badge}</span>` : ''}
      </button>
    `).join('');

    const riList = document.getElementById("recent-interests-list");
    riList.innerHTML = data.recentInterests.map(interest => `
      <div class="interest-list-item">
        <div class="il-icon"><i class="ti ti-heart"></i></div>
        <div>
          <div class="il-name">${interest.name}</div>
          <div class="il-sub">${interest.status}</div>
        </div>
      </div>
    `).join('');
  }

  const PROTOTYPE_USERS = {
    beta: { key: "beta", name: "Beta", role: "business_owner", dashboard: "businessownerdashboard.html" },
    alpha: { key: "alpha", name: "Alpha", role: "investor", dashboard: "investordashboard.html" }
  };

  function setSelectedUser(key) {
    const user = PROTOTYPE_USERS[key];
    if (!user) return;
    localStorage.setItem("lumilabsSelectedUser", JSON.stringify({
      key: user.key,
      name: user.name,
      role: user.role
    }));
  }

  function switchRole(key) {
    const user = PROTOTYPE_USERS[key];
    if (!user) return;
    setSelectedUser(key);
    window.location.href = user.dashboard;
  }

  function openMessagesTab() {
    setSelectedUser("alpha");
    window.location.href = "messages.html";
  }

  function initRoleMenu() {
    const menu = document.getElementById("role-menu");
    const button = document.getElementById("role-menu-button");

    button.addEventListener("click", (event) => {
      event.stopPropagation();
      const isOpen = menu.classList.toggle("open");
      button.setAttribute("aria-expanded", String(isOpen));
    });

    document.addEventListener("click", () => {
      menu.classList.remove("open");
      button.setAttribute("aria-expanded", "false");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        menu.classList.remove("open");
        button.setAttribute("aria-expanded", "false");
      }
    });
  }

  initRoleMenu();
  initInvestor();
</script>
</body>
</html>
